<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Playground</title>

    <link rel="stylesheet" href="playground.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.8.2/typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.0/ace.js"></script>

    <link rel="stylesheet" href="/styles.css" />
    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
</head>

<body data-page="playground">
    <div id="navbar-placeholder"></div>

    <section class="playground-section">

        <div class="playground-container">

            <div class="playground-header">
                <h1>🚀 Code Playground</h1>
                <p>Write, Run and Learn instantly</p>
            </div>

            <div class="playground-toolbar">

                <select id="language">
                    <option value="javascript">JavaScript</option>
                    <option value="typescript">TypeScript</option>
                    <option value="dart">Dart</option>
                </select>

                <button id="runBtn">
                    <i class="fas fa-play"></i>
                    Run
                </button>

                <button id="clearBtn">
                    <i class="fas fa-trash"></i>
                    Clear
                </button>

                <button id="resetBtn">
                    <i class="fas fa-rotate"></i>
                    Reset
                </button>

            </div>

            <div class="playground-grid">

                <div class="editor-card">

                    <div class="card-header">
                        <i class="fas fa-file-code"></i>
                        Editor
                    </div>

                    <div id="editor"></div>

                </div>

                <div class="output-card">

                    <div class="card-header">
                        <i class="fas fa-terminal"></i>
                        Console Output
                    </div>

                    <pre id="output">Run your code...</pre>

                </div>

            </div>

        </div>

    </section>

    <script type="module" src="playground.js"></script>
    <script src="/theme.js"></script>
</body>

  <script>
    loadPartial('navbar-placeholder', '/partials/navbar.html');
    loadPartial('footer-placeholder', '/partials/footer.html');
  </script>

</html>
