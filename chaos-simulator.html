<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chaos Monkey Simulator | Algo Infinity Verse</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <link rel="stylesheet" href="chaos-simulator.css" />
</head>
<body class="chaos-body">

    <div class="simulation-hud">
        <div class="hud-left">
            <h2><i class="fas fa-network-wired"></i> System Design Simulator</h2>
            <div class="status-indicator">
                <span class="dot" id="simStatusDot"></span>
                <span id="simStatusText">Ready</span>
            </div>
        </div>
        
        <div class="hud-center">
            <div class="control-group">
                <button class="btn btn-success" id="btnPlay"><i class="fas fa-play"></i> Start Traffic</button>
                <button class="btn btn-secondary" id="btnPause"><i class="fas fa-pause"></i> Pause</button>
            </div>
            
            <div class="slider-group">
                <label for="trafficSlider">Incoming Traffic: <span id="trafficValue">50</span> req/s</label>
                <input type="range" id="trafficSlider" min="5" max="300" value="50">
            </div>
        </div>

        <div class="hud-right">
            <button class="btn btn-danger chaos-btn" id="btnChaos">
                <i class="fas fa-skull"></i> Unleash Chaos Monkey
            </button>
            <button class="btn btn-outline" id="btnReset"><i class="fas fa-undo"></i> Reset</button>
        </div>
    </div>

    <main class="canvas-container" id="canvas">
        <svg class="connection-layer" id="svgLayer"></svg>
        
        <div id="packetLayer"></div>

        <div class="node" id="node-client" style="left: 50px; top: 300px;" data-type="client" data-capacity="Infinity">
            <div class="node-icon"><i class="fas fa-mobile-alt"></i></div>
            <div class="node-name">Clients</div>
        </div>

        <div class="node" id="node-lb" style="left: 300px; top: 300px;" data-type="lb" data-capacity="500">
            <div class="node-icon"><i class="fas fa-sitemap"></i></div>
            <div class="node-name">Load Balancer</div>
            <div class="load-bar"><div class="load-fill" id="load-lb"></div></div>
        </div>

        <div class="node" id="node-web1" style="left: 600px; top: 150px;" data-type="server" data-capacity="100">
            <div class="node-icon"><i class="fas fa-server"></i></div>
            <div class="node-name">Web Server A</div>
            <div class="load-bar"><div class="load-fill" id="load-web1"></div></div>
        </div>

        <div class="node" id="node-web2" style="left: 600px; top: 300px;" data-type="server" data-capacity="100">
            <div class="node-icon"><i class="fas fa-server"></i></div>
            <div class="node-name">Web Server B</div>
            <div class="load-bar"><div class="load-fill" id="load-web2"></div></div>
        </div>

        <div class="node" id="node-web3" style="left: 600px; top: 450px;" data-type="server" data-capacity="100">
            <div class="node-icon"><i class="fas fa-server"></i></div>
            <div class="node-name">Web Server C</div>
            <div class="load-bar"><div class="load-fill" id="load-web3"></div></div>
        </div>

        <div class="node" id="node-db" style="left: 900px; top: 300px;" data-type="db" data-capacity="250">
            <div class="node-icon"><i class="fas fa-database"></i></div>
            <div class="node-name">Master DB</div>
            <div class="load-bar"><div class="load-fill" id="load-db"></div></div>
        </div>
    </main>

    <script src="chaos-simulator.js"></script>
</body>
</html>
