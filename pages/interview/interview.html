<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep — Algo Infinity Verse</title>
  <meta name="description" content="Everything you need to ace technical interviews. Mock interviews, behavioral prep, collaborative coding, and career resources." />

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="interview.css" />

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script>
    (function() {
      try {
        var t = localStorage.getItem('theme');
        var p = window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = t || (p ? 'light' : 'dark');
        if (theme === 'light') document.documentElement.classList.add('light-mode');
      } catch (e) {}
    })();
  </script>
</head>
<body data-page="interview" data-no-loading>
  <div id="loading-screen" class="hidden">
    <div class="loader">
      <div class="infinity-loader">∞</div>
      <h2>Loading Interview Hub...</h2>
    </div>
  </div>

  <main>
    <!-- HERO -->
    <section class="iv-hero">
      <div class="iv-hero-bg">
        <div class="iv-hero-glow"></div>
        <div class="iv-hero-orb" aria-hidden="true"></div>
      </div>
      <button type="button" class="iv-back-btn" id="ivBackBtn" aria-label="Go back to previous page">
        <i class="fas fa-arrow-left"></i>
        <span>Back</span>
      </button>
      <div class="iv-hero-content">
        <h1 class="iv-hero-title">Interview Prep</h1>
        <p class="iv-hero-subtitle">
          From mock interviews to resume building — everything you need to walk into any interview with confidence.
        </p>

        <!-- SEARCH -->
        <div class="iv-search-wrapper">
          <div class="iv-search">
            <i class="fas fa-search iv-search-icon"></i>
            <input
              type="text"
              id="ivSearchInput"
              class="iv-search-input"
              placeholder="Search interview tools..."
              aria-label="Search interview tools"
              autocomplete="off"
            />
            <button type="button" id="ivClearBtn" class="iv-clear-btn" aria-label="Clear search">
              <i class="fas fa-times"></i>
            </button>
            <span class="iv-search-hint">⌘K</span>
          </div>
        </div>

        <!-- FILTER CHIPS -->
        <div class="iv-filters" id="ivFilters" role="tablist" aria-label="Interview tool categories"></div>

        <p class="iv-result-count" id="ivResultCount">Showing <span id="ivCountDisplay">0</span> tools</p>
      </div>
    </section>

    <!-- CARD GRID -->
    <section class="iv-section">
      <div class="iv-container">
        <div class="iv-grid" id="ivGrid" role="list">
          <!-- Cards rendered by JS -->
        </div>
        <div class="iv-empty" id="ivEmpty" style="display:none;">
          <i class="fas fa-search-minus"></i>
          <h3>No tools found</h3>
          <p>Try adjusting your search or filter.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="/auth.js"></script>
  <script src="/theme.js"></script>
  <script src="/script.js"></script>
  <script src="interview.js"></script>
</body>
</html>
