<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestJS Academy - Algo Infinity Verse</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="nestjs-academy.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-72 bg-white shadow-xl transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 flex flex-col border-r border-gray-200">
        <!-- Logo and Academy Title -->
        <div class="p-5 border-b flex justify-between items-center bg-rose-600 text-white shadow-sm">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-server text-xl"></i> NestJS Academy
            </h1>
            <button id="close-sidebar" class="lg:hidden text-white hover:text-rose-100">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        
        <!-- Course Progress Card -->
        <div class="p-5 border-b bg-rose-50/20">
            <div class="flex justify-between text-xs mb-1.5 font-bold text-slate-500 uppercase tracking-wider">
                <span>Course Progress</span>
                <span id="progress-text" class="text-rose-600">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-rose-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- Modules List navigation -->
        <div class="flex-1 overflow-y-auto p-4">
            <ul id="module-list" class="space-y-2">
                <!-- Dynamically injected sidebar items go here -->
            </ul>
        </div>
    </aside>

    <!-- Main Content Panel -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="open-sidebar" class="lg:hidden text-gray-600 hover:text-rose-600 transition-colors">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h2 id="active-module-title" class="text-lg md:text-xl font-bold text-slate-800">Module Title</h2>
            </div>
            
            <!-- Tabs Switcher Navigation -->
            <nav class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                <button data-tab="lesson" class="tab-btn active px-3 py-2 md:px-4 text-xs md:text-sm font-bold rounded-md text-gray-700 hover:text-rose-600 transition-colors">
                    <i class="fa-solid fa-book-open mr-1"></i> <span class="hidden sm:inline">Lesson Viewer</span>
                </button>
                <button data-tab="playground" class="tab-btn px-3 py-2 md:px-4 text-xs md:text-sm font-bold rounded-md text-gray-700 hover:text-rose-600 transition-colors">
                    <i class="fa-solid fa-code mr-1"></i> <span class="hidden sm:inline">Playground & Code</span>
                </button>
                <button data-tab="quiz" class="tab-btn px-3 py-2 md:px-4 text-xs md:text-sm font-bold rounded-md text-gray-700 hover:text-rose-600 transition-colors">
                    <i class="fa-solid fa-list-check mr-1"></i> <span class="hidden sm:inline">Quiz</span>
                </button>
            </nav>
        </header>

        <!-- Main Workspace Content -->
        <div class="flex-1 overflow-hidden bg-gray-50 p-4 md:p-6 relative">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 w-full h-full overflow-hidden relative">
                
                <!-- Tab 1: Lesson Content -->
                <div id="tab-lesson" class="tab-content h-full overflow-y-auto p-6 md:p-10 active">
                    <!-- Dynamically injected lesson content -->
                </div>

                <!-- Tab 2: Playground & Live Sizing Preview Sandbox -->
                <div id="tab-playground" class="tab-content h-full hidden flex-col md:flex-row bg-gray-50">
                    
                    <!-- Left: Code Workspace Editor -->
                    <div class="w-full md:w-1/2 h-1/2 md:h-full flex flex-col border-b md:border-b-0 md:border-r border-gray-300">
                        <div class="bg-gray-800 text-gray-200 text-xs py-2 px-4 flex justify-between items-center font-mono border-b border-gray-700">
                            <span class="flex items-center gap-1.5"><i class="fa-solid fa-server text-rose-500"></i> main.ts</span>
                            <button id="run-code-btn" class="bg-rose-600 hover:bg-rose-500 text-white px-3 py-1 rounded shadow-sm text-xs font-sans transition-colors font-bold flex items-center gap-1">
                                <i class="fa-solid fa-play"></i> Run Code
                            </button>
                        </div>
                        <textarea id="code-editor" class="flex-1 w-full bg-[#1c1d21] text-[#f5f6f7] p-4 focus:outline-none" spellcheck="false"></textarea>
                    </div>
                    
                    <!-- Right: Simulated Terminal and Postman HTTP API Client -->
                    <div class="w-full md:w-1/2 h-1/2 md:h-full flex flex-col bg-slate-900 overflow-hidden">
                        
                        <!-- Top Panel: Simulated NestJS Terminal Boot Logs -->
                        <div class="h-2/5 flex flex-col border-b border-slate-800 bg-[#0f1015]">
                            <div class="bg-slate-800 text-slate-300 text-[10px] uppercase font-bold py-1 px-4 tracking-wider flex justify-between items-center select-none">
                                <span><i class="fa-solid fa-terminal mr-1 text-green-400"></i> NestJS Server Console</span>
                                <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></span>
                            </div>
                            <div id="simulated-terminal" class="flex-1 p-4 overflow-y-auto terminal-window">
                                <p class="text-slate-500">// Press "Run Code" to compile and start the server.</p>
                            </div>
                        </div>

                        <!-- Bottom Panel: Simulated Postman-style HTTP API Client -->
                        <div class="h-3/5 flex flex-col bg-slate-50 api-client-container">
                            <div class="bg-slate-200 text-slate-700 text-[10px] uppercase font-bold py-1.5 px-4 tracking-wider flex justify-between items-center select-none border-b">
                                <span><i class="fa-solid fa-paper-plane mr-1 text-rose-500"></i> HTTP API Client Sandbox</span>
                                <span class="text-[9px] text-slate-400">Port 3000</span>
                            </div>

                            <!-- Path inputs bar -->
                            <div class="p-3 border-b flex gap-2">
                                <select id="request-method" class="bg-white border rounded text-xs px-2.5 py-1.5 font-bold text-slate-700 focus:outline-none focus:ring-1 focus:ring-rose-500">
                                    <option value="GET">GET</option>
                                    <option value="POST">POST</option>
                                </select>
                                <div class="flex-1 flex border rounded bg-white items-center overflow-hidden">
                                    <span class="bg-gray-100 text-gray-500 text-xs px-2.5 py-1.5 border-r font-mono">http://localhost:3000/</span>
                                    <input id="request-path" type="text" value="users" placeholder="route..." class="flex-1 p-1 text-xs focus:outline-none font-mono" />
                                </div>
                                <button id="send-request-btn" class="bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs px-4 py-1.5 rounded shadow transition-colors">
                                    Send
                                </button>
                            </div>

                            <!-- Payload setup & Responses panel -->
                            <div class="flex-1 grid grid-cols-2 overflow-hidden bg-white text-xs">
                                
                                <!-- Request Config Panel (Left) -->
                                <div class="border-r flex flex-col overflow-hidden p-3 space-y-3">
                                    <div class="flex flex-col flex-1">
                                        <label class="font-bold text-gray-500 text-[10px] uppercase tracking-wider mb-1">Headers</label>
                                        <textarea id="request-headers" placeholder="Authorization: Bearer secret-key" class="flex-1 p-2 border rounded font-mono text-[10px] bg-slate-50 focus:outline-none focus:ring-1 focus:ring-rose-500 resize-none"></textarea>
                                    </div>
                                    <div class="flex flex-col flex-1">
                                        <label class="font-bold text-gray-500 text-[10px] uppercase tracking-wider mb-1">JSON Payload Body</label>
                                        <textarea id="request-body" placeholder='{"title": "New Task"}' class="flex-1 p-2 border rounded font-mono text-[10px] bg-slate-50 focus:outline-none focus:ring-1 focus:ring-rose-500 resize-none"></textarea>
                                    </div>
                                </div>

                                <!-- Response Results Panel (Right) -->
                                <div class="flex flex-col overflow-hidden p-3 bg-slate-900 text-white">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="font-bold text-gray-400 text-[10px] uppercase tracking-wider">JSON Response</span>
                                        <span id="response-status" class="px-2 py-0.5 rounded bg-slate-700 text-slate-300 font-bold font-mono">000</span>
                                    </div>
                                    <pre id="response-body" class="flex-1 p-3 rounded json-response-area overflow-auto select-text">{}</pre>
                                </div>

                            </div>
                        </div>

                    </div>

                </div>

                <!-- Tab 3: Module Quiz -->
                <div id="tab-quiz" class="tab-content h-full overflow-y-auto p-6 md:p-10 hidden">
                    <!-- Dynamically injected quiz components -->
                </div>

            </div>
        </div>
    </main>

    <!-- Script imports -->
    <script src="nestjs-academy.js"></script>
</body>
</html>
